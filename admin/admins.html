<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admins | Admin ASAAV</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <aside class="sidebar">
    <div class="admin-logo">ASAAV</div>

    <nav>
      <a href="index.html">Dashboard</a>
      <a href="events.html">Événements</a>
      <a href="registrations.html">Inscriptions</a>
      <a href="members.html">Membres</a>
      <a href="partners.html">Partenaires</a>
      <a href="admins.html" class="active">Admins</a>
      <a href="messages.html">Messages</a>
      <a href="gallery.html">Galerie</a>
         <a href="">
          <button class="logout-btn" id="logout-btn">
            Déconnexion
          </button>
         </a>

        
    </nav>
  </aside>

  <main class="main">

    <header class="topbar">

      <button class="menu-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <h1>Admins</h1>

    </header>





    <section class="admin-section">

      <div class="section-header">

        <div>
          <h2>Gestion des admins</h2>

          <p>
            Gérez les accès administrateurs ASAAV.
          </p>
        </div>

        <button
          class="admin-primary-btn"
          id="toggle-admin-form"
        >
          + Ajouter un admin
        </button>

      </div>





      <div
        class="admin-form-card hidden"
        id="admin-form-card"
      >

        <h3>Ajouter un admin</h3>

        <form id="create-admin-form">

          <input
            type="text"
            id="admin-firstname"
            placeholder="Prénom"
            required
          >

          <input
            type="text"
            id="admin-lastname"
            placeholder="Nom"
            required
          >

          <input
            type="email"
            id="admin-email"
            placeholder="Email"
            required
          >

          <input
            type="password"
            id="admin-password"
            placeholder="Mot de passe"
            required
          >

          <select id="admin-role" class="admin-select">

            <option value="admin">
              Admin
            </option>

            <option value="super_admin">
              Super Admin
            </option>

          </select>

          <button type="submit">
            Ajouter l’admin
          </button>

        </form>

      </div>





      <div class="admin-table-wrapper">

        <table class="admin-table">

          <thead>
            <tr>
              <th>Prénom</th>
              <th>Nom</th>
              <th>Email</th>
              <th>Rôle</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="admin-admins-list">
            <!-- admins -->
          </tbody>

        </table>

      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
