<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partenaires | Admin ASAAV</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <aside class="sidebar">
    <div class="admin-logo">ASAAV</div>

    <nav>
      <a href="index.html">Dashboard</a>
      <a href="events.html">Événements</a>
      <a href="registrations.html">Inscriptions</a>
      <a href="members.html">Membres</a>
      <a href="partners.html" class="active">Partenaires</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-btn">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <h1>Partenaires</h1>
    </header>

    <section class="admin-section">

      <div class="section-header">
        <div>
          <h2>Gestion des partenaires</h2>
          <p>
            Ajoutez, modifiez ou supprimez les partenaires ASAAV.
          </p>
        </div>

        <button
          class="admin-primary-btn"
          id="toggle-partner-form"
        >
          + Ajouter un partenaire
        </button>
      </div>





      <div
        class="admin-form-card hidden"
        id="partner-form-card"
      >

        <h3 id="partner-form-title">
          Ajouter un partenaire
        </h3>

        <form id="create-partner-form">

          <input
            type="text"
            id="partner-name"
            placeholder="Nom du partenaire"
            required
          >

          <input
            type="text"
            id="partner-website"
            placeholder="Site web"
          >

          <input
            type="file"
            id="partner-image"
            accept="image/*"
          >

          <textarea
            id="partner-description"
            placeholder="Description"
          ></textarea>

          <button type="submit">
            Ajouter le partenaire
          </button>

        </form>

      </div>





      <div class="admin-table-wrapper">

        <table class="admin-table">

          <thead>
            <tr>
              <th>Logo</th>
              <th>Nom</th>
              <th>Site web</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="admin-partners-list">
            <!-- partenaires -->
          </tbody>

        </table>

      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
